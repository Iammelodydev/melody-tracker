<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Melody's Crypto Tracker </title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #f5a623;
      --accent2: #00e5ff;
      --green: #00e676;
      --red: #ff1744;
      --text: #e8e8f0;
      --muted: #555570;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,166,35,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,166,35,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeDown 0.8s ease both;
    }

    header .tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
    }

    header h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -1px;
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      margin-top: 0.8rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* Search bar */
    .search-section {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    .search-section input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      padding: 0.85rem 1.2rem;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-section input:focus {
      border-color: var(--accent);
    }

    .search-section input::placeholder { color: var(--muted); }

    .btn {
      background: var(--accent);
      color: #000;
      border: none;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 0.85rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      white-space: nowrap;
      letter-spacing: 0.5px;
    }

    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    /* Quick coins */
    .quick-coins {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      animation: fadeUp 0.8s 0.3s ease both;
    }

    .quick-coins span {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      margin-right: 0.3rem;
      align-self: center;
    }

    .pill {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .pill:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Status / error */
    #status {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      text-align: center;
      padding: 1rem;
      min-height: 2.5rem;
      color: var(--muted);
    }

    #status.loading { color: var(--accent2); }
    #status.error   { color: var(--red); }

    /* Results grid */
    #results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    /* Coin card */
    .coin-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem;
      position: relative;
      overflow: hidden;
      animation: popIn 0.4s ease both;
      transition: border-color 0.2s, transform 0.2s;
    }

    .coin-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
    }

    .coin-card::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 80px; height: 80px;
      background: radial-gradient(circle at top right, rgba(245,166,35,0.08), transparent 70%);
      pointer-events: none;
    }

    .coin-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.2rem;
    }

    .coin-header img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
    }

    .coin-header .name {
      font-weight: 700;
      font-size: 1rem;
    }

    .coin-header .symbol {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 2px;
    }

    .coin-rank {
      margin-left: auto;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      background: var(--bg);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }

    .coin-price {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 0.6rem;
    }

    .coin-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
    }

    .change {
      font-weight: 700;
      font-size: 0.8rem;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
    }

    .change.up   { color: var(--green); background: rgba(0,230,118,0.1); }
    .change.down { color: var(--red);   background: rgba(255,23,68,0.1); }

    .market-cap { color: var(--muted); }

    /* Footer note */
    .footer {
      text-align: center;
      margin-top: 3rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      animation: fadeUp 0.8s 0.5s ease both;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="tag">Crypto tracker</div>
    <h1>Crypto <span>Price</span> Tracker</h1>
    <p>Live data from CoinGecko API using JavaScript callbacks</p>
  </header>

  <div class="search-section">
    <input type="text" id="coinInput" placeholder="e.g. bitcoin, ethereum, solana, verse..." />
    <button class="btn" onclick="handleSearch()">Search</button>
  </div>

  <div class="quick-coins">
    <span>Quick:</span>
    <button class="pill" onclick="fetchCoin('bitcoin')">BTC</button>
    <button class="pill" onclick="fetchCoin('ethereum')">ETH</button>
    <button class="pill" onclick="fetchCoin('solana')">SOL</button>
    <button class="pill" onclick="fetchCoin('binancecoin')">BNB</button>
    <button class="pill" onclick="fetchCoin('ripple')">XRP</button>
    <button class="pill" onclick="loadTopCoins()">Top 10 🔥</button>
  </div>

  <div id="status"></div>
  <div id="results"></div>

  <div class="footer">
    <p>Data from CoinGecko Public API &nbsp;·&nbsp; Built with HTML, CSS & JavaScript Callbacks</p>
  </div>
</div>

<script>
  
  function formatMarketCap(num) {
    if (num >= 1e12) return '$' + (num / 1e12).toFixed(2) + 'T';
    if (num >= 1e9)  return '$' + (num / 1e9).toFixed(2) + 'B';
    if (num >= 1e6)  return '$' + (num / 1e6).toFixed(2) + 'M';
    return '$' + num.toLocaleString();
  }

  
  function displayCoins(coins) {
    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = ''; // Clear old results

    if (!coins || coins.length === 0) {
      setStatus('No coins found. Try a different name.', 'error');
      return;
    }

    setStatus(''); // Clear status

    // Loop through each coin and create a card
    coins.forEach(function(coin, index) {
      const change = coin.price_change_percentage_24h;
      const isUp = change >= 0;

      const price = coin.current_price < 0.01
        ? '$' + coin.current_price.toFixed(8)
        : '$' + coin.current_price.toLocaleString(undefined, { maximumFractionDigits: 2 });

      const card = document.createElement('div');
      card.className = 'coin-card';
      card.style.animationDelay = (index * 0.08) + 's';

      card.innerHTML = `
        <div class="coin-header">
          <img src="${coin.image}" alt="${coin.name}" onerror="this.src='https://placehold.co/36x36/12121a/555570?text=?'"/>
          <div>
            <div class="name">${coin.name}</div>
            <div class="symbol">${coin.symbol}</div>
          </div>
          <div class="coin-rank">#${coin.market_cap_rank || '?'}</div>
        </div>
        <div class="coin-price">${price}</div>
        <div class="coin-meta">
          <span class="change ${isUp ? 'up' : 'down'}">
            ${isUp ? '▲' : '▼'} ${Math.abs(change).toFixed(2)}%
          </span>
          <span class="market-cap">MCap: ${formatMarketCap(coin.market_cap)}</span>
        </div>
      `;

      resultsDiv.appendChild(card);
    });
  }

  
  function fetchFromAPI(url, callback) {
    setStatus('<span class="spinner"></span> Fetching data...', 'loading');

    fetch(url)
      .then(function(response) {
        if (!response.ok) {
          throw new Error('API Error: ' + response.status);
        }
        return response.json();
      })
      .then(function(data) {
        // HERE is the callback! We pass data to displayCoins
        callback(data);
      })
      .catch(function(error) {
        setStatus('⚠ ' + error.message + ' — Try again in a moment.', 'error');
      });
  }

  
  function fetchCoin(coinId) {
    const url = 'https://api.coingecko.com/api/v3/coins/markets'
      + '?vs_currency=usd'
      + '&ids=' + coinId
      + '&price_change_percentage=24h';

    // Pass displayCoins as the CALLBACK
    fetchFromAPI(url, displayCoins);
  }

  
  function loadTopCoins() {
    const url = 'https://api.coingecko.com/api/v3/coins/markets'
      + '?vs_currency=usd'
      + '&order=market_cap_desc'
      + '&per_page=10'
      + '&page=1'
      + '&price_change_percentage=24h';

    fetchFromAPI(url, displayCoins);
  }

 
  function handleSearch() {
    const input = document.getElementById('coinInput').value.trim().toLowerCase();
    if (!input) {
      setStatus('Please enter a coin name.', 'error');
      return;
    }
    fetchCoin(input);
  }

  // Allow pressing Enter to search
  document.getElementById('coinInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleSearch();
  });

  
  function setStatus(message, type) {
    const el = document.getElementById('status');
    el.innerHTML = message;
    el.className = type || '';
  }

  
  loadTopCoins();
</script>

</body>
</html>
